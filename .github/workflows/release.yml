name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross_deps: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: claude_usage_daemon

      - name: Install cross-compilation tools
        if: matrix.cross_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path claude_usage_daemon/Cargo.toml

      - name: Package
        run: |
          cd claude_usage_daemon/target/${{ matrix.target }}/release
          tar -czf ../../../../claude-usage-daemon-${{ matrix.target }}.tar.gz claude-usage-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-daemon-${{ matrix.target }}
          path: claude-usage-daemon-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: claude-usage-daemon-*.tar.gz
          generate_release_notes: true
